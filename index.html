<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoJSON Viewer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23388bfd' stroke-width='2'><polygon points='3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21'/><line x1='9' y1='3' x2='9' y2='18'/><line x1='15' y1='6' x2='15' y2='21'/></svg>">
  <link rel="stylesheet" href="static/maplibre-gl.css">
  <script src="static/maplibre-gl.js"></script>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

<div id="app">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside id="sidebar">

    <div class="sidebar-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#388bfd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9" y1="3" x2="9" y2="18"/>
          <line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
        <span>GeoJSON Viewer</span>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="load">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Files
      </button>
      <button class="tab-btn" data-tab="layers">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Layers
      </button>
      <button class="tab-btn" data-tab="draw">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Draw
      </button>
    </div>

    <!-- ── Load tab ──────────────────────────────────────── -->
    <div id="tab-load" class="tab-panel active">

      <div id="dropzone" tabindex="0" role="button" aria-label="Drop GeoJSON files here or click to browse">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px;opacity:0.5">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        <div class="dropzone-title">Drop GeoJSON files here</div>
        <div class="dropzone-sub">or click to browse</div>
        <input type="file" id="file-input" accept=".geojson,.json" multiple>
      </div>

      <div class="section">
        <div class="section-label">Load from file path <span class="badge-hint">large files</span></div>
        <div class="input-group">
          <input type="text" id="path-input" placeholder="/path/to/large-file.geojson" spellcheck="false">
        </div>
        <div class="input-row">
          <div class="input-group" style="flex:1">
            <label>Max features</label>
            <input type="number" id="max-features" value="100000" min="1000" max="5000000">
          </div>
          <button id="btn-path-load" class="btn-accent">Load</button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">
          Data folder
          <button id="btn-refresh-files" class="icon-btn" title="Refresh">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
        <div id="data-files"><div class="empty-state small">No files in data/ folder</div></div>
      </div>

    </div>

    <!-- ── Layers tab ─────────────────────────────────────── -->
    <div id="tab-layers" class="tab-panel">
      <div class="section-label" style="margin-bottom:8px">
        Layers
        <div style="display:flex;gap:4px">
          <button id="btn-zoom-all" class="icon-btn" title="Zoom to all layers">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <button id="btn-clear-all" class="icon-btn danger" title="Remove all layers">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
      <div id="layer-list">
        <div class="empty-state">No layers loaded.<br>Load a GeoJSON file to begin.</div>
      </div>
    </div>

    <!-- ── Draw tab ───────────────────────────────────────── -->
    <div id="tab-draw" class="tab-panel">

      <div class="section">
        <div class="section-label">Draw tools</div>
        <div class="draw-tools">
          <button class="draw-btn active" data-mode="select" title="Select / Pan">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-7 1-4 7z"/></svg>
            <span>Select</span>
          </button>
          <button class="draw-btn" data-mode="point" title="Add point">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
            <span>Point</span>
          </button>
          <button class="draw-btn" data-mode="line" title="Draw line">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="4"/></svg>
            <span>Line</span>
          </button>
          <button class="draw-btn" data-mode="polygon" title="Draw polygon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/></svg>
            <span>Polygon</span>
          </button>
        </div>
        <div id="draw-hint" class="draw-hint">Select a draw tool above</div>
      </div>

      <div class="section">
        <div class="section-label">Drawn features <span id="draw-count" class="badge-count">0</span></div>
        <button id="btn-export-draw" class="btn-full btn-accent">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export as GeoJSON
        </button>
        <button id="btn-add-draw-as-layer" class="btn-full btn-secondary" style="margin-top:6px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          Add as layer
        </button>
        <button id="btn-clear-draw" class="btn-full btn-danger" style="margin-top:6px">Clear all drawn</button>
        <button id="btn-undo-draw" class="btn-full btn-secondary" style="margin-top:6px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          Undo last
        </button>
      </div>
    </div>

  </aside>

  <!-- ── Map ───────────────────────────────────────────────── -->
  <main id="map-wrap">
    <div id="map"></div>

    <!-- Basemap switcher -->
    <div id="basemap-switcher">
      <button class="bm-btn active" data-style="dark">Dark</button>
      <button class="bm-btn" data-style="light">Light</button>
      <button class="bm-btn" data-style="streets">Streets</button>
      <button class="bm-btn" data-style="satellite">Satellite</button>
    </div>

    <!-- Notifications -->
    <div id="notifications"></div>

    <!-- Loading overlay -->
    <div id="loading-overlay" hidden>
      <div class="spinner"></div>
      <span id="loading-msg">Loading…</span>
    </div>

    <!-- ── Inspector (overlays the map, no effect on layout) ── -->
    <div id="inspector">
      <div class="inspector-header">
        <span>Properties</span>
        <button id="btn-close-inspector" class="icon-btn" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="inspector-meta"></div>
      <div id="inspector-body"></div>
    </div>
  </main>

</div>

<!-- ── Status bar ──────────────────────────────────────────── -->
<div id="statusbar">
  <span id="status-coords">—</span>
  <span class="sep">|</span>
  <span id="status-zoom">Zoom: 2.0</span>
  <span class="sep">|</span>
  <span id="status-layers">No layers</span>
</div>

<script src="static/app.js"></script>
</body>
</html>
